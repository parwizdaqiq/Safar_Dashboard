<div class="admin-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">S</div>
      <div>
        <h3>Safar</h3>
        <span>Admin Panel</span>
      </div>
    </div>

    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Dashboard
      </a>
      <a routerLink="/trips" routerLinkActive="active">Trips</a>
      <a routerLink="/routes" routerLinkActive="active">Routes</a>
      <a routerLink="/vehicles" routerLinkActive="active">Vehicles</a>
      <a routerLink="/bookings" routerLinkActive="active">Bookings</a>
      <a routerLink="/agencies" routerLinkActive="active">Agencies</a>
      <a routerLink="/users" routerLinkActive="active">Users</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div>
        <h2>Safar Admin</h2>
        <p>Manage routes, trips, bookings and agencies</p>
      </div>
      <button class="admin-btn">Admin</button>
    </header>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
