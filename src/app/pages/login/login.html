<div class="login-page">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">S</div>
      <h1>Safar Admin</h1>
      <p>Login to continue</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        placeholder="admin@safar.com"
        [(ngModel)]="email"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        placeholder="********"
        [(ngModel)]="password"
      />
    </div>

    <button
      class="login-btn"
      (click)="login()"
      [disabled]="isLoading"
    >
      {{ isLoading ? 'Signing In...' : 'Sign In' }}
    </button>
  </div>
</div>
